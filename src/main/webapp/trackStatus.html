<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SmartCore · Track Maintenance Status</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">

<style>

body{
background:linear-gradient(145deg,#f0f7ff 0%,#e9f2fa 100%);
font-family:'Inter','Segoe UI',sans-serif;
}

/* NAVBAR */
.smart-navbar{
background:rgba(255,255,255,0.75);
backdrop-filter:blur(16px);
border-bottom:1px solid rgba(255,255,255,0.5);
box-shadow:0 10px 35px -10px rgba(0,60,130,0.08);
padding:14px 28px;
margin:20px 30px;
border-radius:60px;
}

/* MAIN CARD */
.log-issue-area{
background:rgba(255,255,255,0.8);
backdrop-filter:blur(12px);
border-radius:32px;
box-shadow:0 15px 35px -12px rgba(0,60,130,0.08);
padding:40px;
}

/* FILTER BAR */
.filter-bar{
background:rgba(255,255,255,0.9);
border-radius:24px;
box-shadow:0 10px 25px rgba(0,0,0,0.05);
padding:22px;
margin-bottom:25px;
}

/* ISSUE CARD */
.issue-card{
background:white;
border-radius:26px;
padding:26px;
box-shadow:0 15px 35px rgba(0,60,130,0.08);
transition:0.25s;
}

.issue-card:hover{
transform:translateY(-6px);
box-shadow:0 25px 45px rgba(13,110,253,0.12);
}

/* ICON CIRCLE */
.icon-circle{
width:42px;
height:42px;
display:flex;
align-items:center;
justify-content:center;
border-radius:16px;
background:rgba(13,110,253,0.08);
color:#0d6efd;
}

/* STATUS DOT */
.status-indicator{
width:9px;
height:9px;
border-radius:50%;
display:inline-block;
margin-right:6px;
}

.status-pending{background:#ffc107;}
.status-progress{background:#0d6efd;}
.status-resolved{background:#198754;}

/* PROGRESS BAR */
.progress{
height:8px;
border-radius:50px;
background:#e9f2fa;
}

.progress-bar{
border-radius:50px;
}

/* FORM */
.form-control{
border-radius:16px;
}

.form-select{
border-radius:16px;
}

</style>
</head>

<body>

<!-- NAVBAR -->

<nav class="navbar smart-navbar">
<div class="container-fluid px-3">

<span class="navbar-brand fw-bold fs-4">
<i class="bi bi-activity text-primary me-2"></i>
Track Maintenance Status
</span>

<span id="lastUpdate" class="badge bg-primary bg-opacity-10 text-dark px-3 py-2 rounded-pill">
Waiting for update...
</span>

</div>
</nav>


<section style="padding:20px 30px 40px 30px;">

<div class="container">
<div class="col-lg-10 mx-auto">

<div class="log-issue-area">

<h3 class="fw-bold mb-4">🔍 Monitoring Dashboard</h3>

<!-- FILTER BAR -->

<div class="filter-bar row g-3 align-items-center">

<div class="col-md-3">
<select id="categoryFilter" class="form-select">
<option value="maintenance">Maintenance Requests</option>
<option value="energy">Energy Usage Logs</option>
<option value="room">Room Status</option>
</select>
</div>

<div class="col-md-4">
<input type="text" id="searchInput" class="form-control"
placeholder="Search by Room, Request ID, Description">
</div>

<div class="col-md-3">
<select id="sortFilter" class="form-select">
<option value="latest">Latest First</option>
<option value="status">Status Based</option>
</select>
</div>

<div class="col-md-2">
<div class="form-check">
<input class="form-check-input" type="checkbox" id="showCompleted">
<label class="form-check-label small">
Show Completed
</label>
</div>
</div>

</div>

<!-- ISSUES -->

<div id="issueContainer"></div>

</div>
</div>
</div>

</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>

const API_URL = "dashboardData";
const REFRESH_INTERVAL = 15000;

let allIssues = [];

async function fetchIssues(){

try{

const response = await fetch(API_URL);
const data = await response.json();

allIssues = data.maintenance || [];

applyFilters();

const now = new Date();

document.getElementById("lastUpdate").innerHTML =
"Last updated: " + now.toLocaleTimeString();

}catch(error){
console.error("Error:",error);
}

}

function applyFilters(){

let filtered = [...allIssues];

const searchValue =
document.getElementById("searchInput").value.toLowerCase();

const sortValue =
document.getElementById("sortFilter").value;

const showCompleted =
document.getElementById("showCompleted").checked;


/* SEARCH */

if(searchValue){

filtered = filtered.filter(issue =>

issue.room.toLowerCase().includes(searchValue) ||
issue.issue.toLowerCase().includes(searchValue) ||
("req-" + filtered.indexOf(issue)).includes(searchValue)

);

}


/* HIDE COMPLETED */

if(!showCompleted){

filtered = filtered.filter(issue =>
issue.status !== "Completed" && issue.status !== "Resolved"
);

}


/* SORT */

if(sortValue === "latest"){
filtered.sort((a,b)=>new Date(b.date)-new Date(a.date));
}

if(sortValue === "status"){

const order = {
"Pending":1,
"In Progress":2,
"Completed":3
};

filtered.sort((a,b)=>
(order[a.status] || 99) - (order[b.status] || 99)
);

}

renderIssues(filtered);

}

function renderIssues(issues){

const container = document.getElementById("issueContainer");

container.innerHTML = "";

if(!issues.length){

container.innerHTML = `
<div class="text-center text-muted mt-4">
<h6>No records match your filters</h6>
</div>
`;

return;

}

issues.forEach((issue,index)=>{

let statusClass = "status-pending";
let badgeClass = "bg-warning bg-opacity-25 text-warning-emphasis";
let progressPercent = 25;

if(issue.status === "In Progress"){

statusClass = "status-progress";
badgeClass = "bg-primary bg-opacity-25 text-primary-emphasis";
progressPercent = 60;

}

if(issue.status === "Completed" || issue.status === "Resolved"){

statusClass = "status-resolved";
badgeClass = "bg-success bg-opacity-15 text-success";
progressPercent = 100;

}

container.innerHTML += `

<div class="issue-card mb-3">

<div class="d-flex justify-content-between align-items-start">

<div>

<span class="badge bg-primary bg-opacity-10 text-primary rounded-pill mb-2">
#REQ-${index + 1}
</span>

<div class="d-flex align-items-center gap-3">

<div class="icon-circle">
<i class="bi bi-tools"></i>
</div>

<div>
<h5 class="fw-bold mb-1">${issue.issue}</h5>
<div class="text-secondary small">
<i class="bi bi-geo-alt me-1"></i>${issue.room}
<span class="mx-2">|</span>
<i class="bi bi-clock me-1"></i>${issue.date}
</div>
</div>

</div>

</div>

<span class="badge ${badgeClass} px-4 py-2 rounded-pill fw-semibold">
<span class="status-indicator ${statusClass}"></span>
${issue.status}
</span>

</div>

<div class="progress mt-3">
<div class="progress-bar bg-primary"
style="width:${progressPercent}%;">
</div>
</div>

</div>

`;

});

}


/* EVENT LISTENERS */

document.getElementById("searchInput")
.addEventListener("input",applyFilters);

document.getElementById("sortFilter")
.addEventListener("change",applyFilters);

document.getElementById("showCompleted")
.addEventListener("change",applyFilters);

document.getElementById("categoryFilter")
.addEventListener("change",applyFilters);


/* INITIAL LOAD */

fetchIssues();
setInterval(fetchIssues,REFRESH_INTERVAL);

</script>

</body>
</html>
