<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartCore | Admin Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://unpkg.com/feather-icons"></script>

<style>

body{
background:linear-gradient(145deg,#f0f7ff 0%,#e9f2fa 100%);
font-family:'Inter','Segoe UI',sans-serif;
}

/* SIDEBAR */

.smart-sidebar{
width:260px;
min-height:100vh;
background:radial-gradient(circle at 20% 30%,#0a2c4b,#02101b);
padding:30px;
display:flex;
flex-direction:column;
box-shadow:20px 0 40px -15px rgba(0,30,60,0.25);
}

.smart-sidebar .nav-link{
color:rgba(255,255,255,0.75);
border-radius:16px;
padding:12px 20px;
margin-bottom:6px;
font-weight:500;
}

.smart-sidebar .nav-link:hover{
background:rgba(13,110,253,0.3);
color:white;
}

.smart-sidebar .nav-link.active{
background:linear-gradient(95deg,#0d6efd,#6f42c1);
color:white;
}

.sidebar-brand{
font-size:1.8rem;
font-weight:700;
background:linear-gradient(145deg,#fff,#c7e0ff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin-bottom:35px;
}

/* MAIN */

.main-flex{
flex:1;
display:flex;
flex-direction:column;
}

/* NAVBAR */

.smart-navbar{
background:rgba(255,255,255,0.75);
backdrop-filter:blur(16px);
border-bottom:1px solid rgba(255,255,255,0.5);
box-shadow:0 10px 35px -10px rgba(0,60,130,0.08);
padding:12px 28px;
margin:20px 30px 0 30px;
border-radius:60px;
}

/* STAT CARDS */

.stat-card{
background:rgba(255,255,255,0.9);
backdrop-filter:blur(10px);
border-radius:28px;
box-shadow:0 20px 40px -15px rgba(13,110,253,0.1);
padding:25px;
}

.icon-circle{
width:58px;
height:58px;
display:flex;
align-items:center;
justify-content:center;
border-radius:20px;
background:rgba(13,110,253,0.08);
color:#0d6efd;
}

/* MAIN CARD */

.glass-card{
background:rgba(255,255,255,0.8);
backdrop-filter:blur(12px);
border-radius:32px;
box-shadow:0 15px 35px -12px rgba(0,60,130,0.08);
padding:30px;
}

/* TABLE */

.table-smart{
border-collapse:separate;
border-spacing:0 10px;
}

.table-smart thead th{
border-bottom:2px solid rgba(13,110,253,0.1);
font-weight:600;
font-size:0.8rem;
text-transform:uppercase;
padding:16px 12px;
}

.table-smart tbody tr{
background:white;
border-radius:24px;
box-shadow:0 8px 20px -10px rgba(0,0,0,0.03);
}

.table-smart td{
padding:18px 12px;
border:none;
}

.badge-smart{
padding:8px 18px;
border-radius:60px;
font-weight:600;
font-size:0.8rem;
}

</style>
</head>

<body>

<div class="d-flex">

<!-- SIDEBAR -->

<div class="main-flex">

<!-- NAVBAR -->

<nav class="navbar smart-navbar">
<div class="container-fluid">

<span class="navbar-brand fw-bold fs-4">
<i data-feather="activity" class="me-2 text-primary"></i>
Admin Dashboard
</span>

<span class="badge bg-primary bg-opacity-15 text-dark px-4 py-2 rounded-pill">
<i data-feather="radio" class="me-1"></i> live sync
</span>

</div>
</nav>

<main class="p-4">

<!-- STATS -->

<div class="row g-4 mb-5">

<div class="col-md-4">
<div class="stat-card d-flex justify-content-between align-items-center">
<div>
<p class="text-secondary mb-1 small fw-semibold">Total Requests</p>
<h3 class="fw-bold display-6 mb-0" id="totalRequests">0</h3>
</div>
<div class="icon-circle">
<i data-feather="clipboard"></i>
</div>
</div>
</div>

<div class="col-md-4">
<div class="stat-card d-flex justify-content-between align-items-center">
<div>
<p class="text-secondary mb-1 small fw-semibold">Pending</p>
<h3 class="fw-bold display-6 mb-0" id="pendingRequests">0</h3>
</div>
<div class="icon-circle" style="background:rgba(255,193,7,0.1);color:#ffc107;">
<i data-feather="alert-circle"></i>
</div>
</div>
</div>

<div class="col-md-4">
<div class="stat-card d-flex justify-content-between align-items-center">
<div>
<p class="text-secondary mb-1 small fw-semibold">Completed</p>
<h3 class="fw-bold display-6 mb-0" id="completedRequests">0</h3>
</div>
<div class="icon-circle" style="background:rgba(25,135,84,0.1);color:#198754;">
<i data-feather="check-circle"></i>
</div>
</div>
</div>

</div>

<!-- TABLE -->

<div class="glass-card">

<h5 class="fw-bold mb-4">
<i data-feather="tool" class="me-2"></i>
Maintenance Requests
</h5>

<div class="table-responsive">

<table class="table table-smart">

<thead>
<tr>
<th>ID</th>
<th>Location</th>
<th>Issue</th>
<th>Priority</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="requestTable"></tbody>

</table>

</div>

</div>

</main>

</div>

</div>

<script>

feather.replace()

function priorityColor(p){
return p==="High"?"danger":
p==="Medium"?"warning":"success"
}

function statusColor(s){
return s==="Completed"?"success":
s==="Pending"?"warning":"primary"
}

function loadRequests(){

fetch("getAllRequests")
.then(res=>res.json())
.then(data=>{

let table=document.getElementById("requestTable")

let total=0
let pending=0
let completed=0

table.innerHTML=""

data.forEach(r=>{

total++

if(r.status==="Pending") pending++
if(r.status==="Completed") completed++

table.innerHTML+=`

<tr>
<td>${r.id}</td>
<td>${r.location}</td>
<td>${r.issue}</td>

<td>
<span class="badge bg-${priorityColor(r.priority)} badge-smart">
${r.priority}
</span>
</td>

<td>
<span class="badge bg-${statusColor(r.status)} badge-smart">
${r.status}
</span>
</td>

<td>

<div class="d-flex gap-2">

<select id="status_${r.id}" class="form-select form-select-sm">

<option value="Pending" ${r.status==="Pending"?"selected":""}>Pending</option>
<option value="In Progress" ${r.status==="In Progress"?"selected":""}>In Progress</option>
<option value="Completed" ${r.status==="Completed"?"selected":""}>Completed</option>

</select>

<button class="btn btn-primary btn-sm"
onclick="updateStatus(${r.id})">
Update
</button>

</div>

</td>

</tr>

`

})

document.getElementById("totalRequests").textContent=total
document.getElementById("pendingRequests").textContent=pending
document.getElementById("completedRequests").textContent=completed

})

}

function updateStatus(id){

let status=document.getElementById("status_"+id).value

fetch("updateRequestStatus",{

method:"POST",

headers:{
"Content-Type":"application/x-www-form-urlencoded"
},

body:`id=${id}&status=${status}`

})

.then(()=>{
alert("Status Updated Successfully")
loadRequests()
})

}

loadRequests()
setInterval(loadRequests,15000)

</script>

</body>
</html>
