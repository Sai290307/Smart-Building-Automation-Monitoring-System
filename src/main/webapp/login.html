<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | SmartCore Sync Hub</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/feather-icons"></script>
<style>
body {
    background: linear-gradient(145deg, #f0f7ff 0%, #e9f2fa 100%);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}
.login-container {
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    flex: 1;
}
.login-card {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    border-radius: 32px;
    box-shadow: 0 15px 35px -12px rgba(0,60,130,0.08);
    padding: 40px 32px;
    width: 100%;
    max-width: 400px;
    transition: all 0.3s;
}
.login-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 25px 45px -10px rgba(0,60,130,0.12);
}
.login-title {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(145deg,#0d6efd,#6f42c1);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
.login-subtitle {
    color: #1a3a5f;
    margin-top: 6px;
}
.input-field {
    background: rgba(255,255,255,0.9);
    border: 1px solid rgba(13,110,253,0.2);
    border-radius: 16px;
    padding: 10px 14px;
    width: 100%;
    transition: all 0.2s;
}
.input-field:focus {
    border-color: #0d6efd;
    outline: none;
    box-shadow: 0 0 8px rgba(13,110,253,0.2);
}
.btn-login {
    background: linear-gradient(145deg,#0d6efd,#6f42c1);
    color: white;
    font-weight: 600;
    border-radius: 40px;
    padding: 12px 0;
    transition: all 0.3s;
}
.btn-login:hover {
    opacity: 0.95;
    transform: translateY(-1px);
}
.remember-me label {
    color: #1a3a5f;
}
.forgot-pass a {
    color: #0d6efd;
}
.footer-text {
    text-align: center;
    color: #1e3b5a;
    margin-top: 16px;
    font-size: 0.875rem;
}
</style>
</head>
<body>

<div class="login-container">

    <div class="login-card">
        <div class="text-center mb-6">
            <h1 class="login-title">SmartCore</h1>
            <p class="login-subtitle">Sync Hub · Building Dashboard</p>
        </div>

        <form id="loginForm" action="LoginServlet" method="post" class="space-y-5">

            <div>
                <label for="email" class="block text-sm font-medium mb-1 text-gray-700">Email</label>
                <input type="email" id="email" name="email" required
                       class="input-field">
            </div>

            <div>
                <label for="password" class="block text-sm font-medium mb-1 text-gray-700">Password</label>
                <input type="password" id="password" name="password" required
                       class="input-field">
            </div>

            <div class="flex items-center justify-between text-sm">
                <div class="flex items-center remember-me">
                    <input id="remember-me" name="remember-me" type="checkbox" 
                           class="h-4 w-4 text-blue-600 border-gray-300 rounded">
                    <label for="remember-me" class="ml-2">Remember me</label>
                </div>
                <div class="forgot-pass">
                    <a href="#">Forgot password?</a>
                </div>
            </div>

            <button type="submit" class="btn-login w-full">
                Sign in
            </button>

        </form>

        <div class="footer-text mt-6">
            Don't have an account? <a href="dashboard.html" class="font-semibold text-blue-600 hover:text-blue-500">Contact admin</a>
        </div>
    </div>

</div>

<script>
feather.replace();
</script>

</body>
</html>
